name: core

# The Rust core. Runs only when the crate, its lockfile, the deny policy, or
# this workflow changes — an app-only change never rebuilds it.
on:
  push:
    branches:
      - main
    paths:
      - 'core/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'deny.toml'
      - '.github/workflows/core.yml'
  pull_request:
    paths:
      - 'core/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'deny.toml'
      - '.github/workflows/core.yml'

concurrency:
  group: core-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Formatting
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

  build-test-linux:
    name: build & test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --locked
      - name: Test
        run: cargo test --locked -- --nocapture --test-threads=1

  # Host-specific compile check: catches the macOS `#[cfg]` branches and the
  # Apple-framework linking Linux can't see. Logic is covered on Linux, so
  # this is build-only.
  build-macos:
    name: build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --locked

  # Supply-chain gate: RustSec advisories, license policy, and the allowed git
  # sources (the p2panda fork). Config in deny.toml.
  deny:
    name: deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: Deny
        run: cargo deny check
